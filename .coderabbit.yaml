# CodeRabbit — PomoDaddy (Swift/SwiftUI pomodoro app)
language: en-US
tone_instructions: >
  Be direct and concise. No pleasantries. Focus on bugs, security,
  performance, and correctness. Flag deferred work (TODOs without issues).

reviews:
  profile: assertive
  auto_review:
    enabled: true
    drafts: true
  request_changes_workflow: true
  review_effort: 4
  collapse_walkthrough: true
  poem: false
  slop_detection:
    enabled: true
  path_filters:
    - "!**/*.lock"
    - "!**/generated/**"
    - "!**/*.min.js"
    - "!**/*.min.css"

  path_instructions:
    - path: "PomoDaddy/**"
      instructions: |
        SwiftUI pomodoro timer app. Check for:
        - Timer accuracy (use DispatchSourceTimer, not Timer.scheduledTimer)
        - Background execution (BGTaskScheduler for timer continuation)
        - Memory management (weak self in closures)
        - SwiftUI state management (@State, @StateObject, @ObservedObject usage)
        - Notification scheduling correctness

  tools:
    actionlint:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: local
  code_guidelines:
    enabled: true
    filePatterns:
      - "CLAUDE.md"
  web_search:
    enabled: true

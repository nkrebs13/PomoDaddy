name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v2026.3.4)'
        required: true

permissions:
  contents: write

env:
  APP_NAME: PomoDaddy
  SCHEME: PomoDaddy
  PROJECT: PomoDaddy.xcodeproj

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.tag }}" | sed 's/^v//' >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=""

      - name: Create DMG
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/$APP_NAME.app"
          codesign --force --deep -s "-" "$APP_PATH"

          create-dmg \
            --volname "$APP_NAME" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "$APP_NAME.app" 150 200 \
            --app-drop-link 450 200 \
            "build/$APP_NAME-${{ steps.version.outputs.version }}.dmg" \
            "$APP_PATH" \
          || true

          # Fallback to zip if create-dmg fails
          if ! ls build/*.dmg 1>/dev/null 2>&1; then
            cd build/DerivedData/Build/Products/Release
            ditto -c -k --keepParent "$APP_NAME.app" "$GITHUB_WORKSPACE/build/$APP_NAME-${{ steps.version.outputs.version }}.zip"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            build/PomoDaddy-*.dmg
            build/PomoDaddy-*.zip
          generate_release_notes: false
          body: |
            ## PomoDaddy ${{ steps.version.outputs.version }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Install

            **Homebrew:**
            ```bash
            brew tap nkrebs13/tap
            brew install --cask pomodaddy
            ```

            **Manual:** Download the DMG below, open it, and drag PomoDaddy to Applications.

            > On first launch, macOS may ask you to allow the app. Right-click > Open > Open.

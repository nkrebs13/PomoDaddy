name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run SwiftLint
        run: swiftlint lint --strict

      - name: Run SwiftFormat check
        run: swiftformat --lint .

      - name: Build
        run: |
          xcodebuild build \
            -project PomoDaddy.xcodeproj \
            -scheme PomoDaddy \
            -destination 'platform=macOS'

      - name: Run tests
        run: |
          xcodebuild test \
            -project PomoDaddy.xcodeproj \
            -scheme PomoDaddy \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults

      - name: Check coverage
        run: |
          xcrun xccov view --report TestResults.xcresult > coverage.txt || true
          if [ -f coverage.txt ]; then
            COVERAGE=$(grep "PomoDaddy.app" coverage.txt | awk '{print $NF}' | sed 's/%//' | head -1)
            if [ ! -z "$COVERAGE" ]; then
              echo "Coverage: $COVERAGE%"
              if (( $(echo "$COVERAGE < 70" | bc -l) )); then
                echo "❌ FAIL: Coverage $COVERAGE% is below minimum threshold of 70%"
                exit 1
              else
                echo "✅ Coverage check passed: $COVERAGE%"
              fi
            else
              echo "⚠️ Could not parse coverage percentage"
              exit 1
            fi
          else
            echo "❌ Coverage report not generated"
            exit 1
          fi

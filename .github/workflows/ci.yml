name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', '.github/ISSUE_TEMPLATE/**']
  pull_request:
    branches: [main]
    types: [opened, ready_for_review]
    paths-ignore: ['**.md', 'docs/**', '.github/ISSUE_TEMPLATE/**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run SwiftLint
        run: swiftlint lint --strict

      - name: Run SwiftFormat check
        run: swiftformat --lint .

      - name: Security scan
        run: bash scripts/security-scan.sh

      - name: Build
        run: |
          xcodebuild build \
            -project PomoDaddy.xcodeproj \
            -scheme PomoDaddy \
            -destination 'platform=macOS'

      - name: Run tests
        run: |
          xcodebuild test \
            -project PomoDaddy.xcodeproj \
            -scheme PomoDaddy \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults

      - name: Check coverage
        run: |
          xcrun xccov view --report TestResults.xcresult > coverage.txt || true
          if [ -f coverage.txt ]; then
            # Extract percentage — handles both "37.2%" and "(2697/7251) 37.2%" formats
            COVERAGE=$(grep "PomoDaddy.app" coverage.txt | grep -oE '[0-9]+\.[0-9]+%' | sed 's/%//' | head -1)
            if [ -z "$COVERAGE" ]; then
              # Fallback: compute from fraction format (2697/7251)
              FRACTION=$(grep "PomoDaddy.app" coverage.txt | grep -oE '\([0-9]+/[0-9]+\)' | head -1 | tr -d '()')
              if [ ! -z "$FRACTION" ]; then
                NUM=$(echo "$FRACTION" | cut -d/ -f1)
                DEN=$(echo "$FRACTION" | cut -d/ -f2)
                COVERAGE=$(echo "scale=1; $NUM * 100 / $DEN" | bc)
              fi
            fi
            if [ ! -z "$COVERAGE" ]; then
              echo "Coverage: $COVERAGE%"
              if (( $(echo "$COVERAGE < 39" | bc -l) )); then
                echo "❌ FAIL: Coverage $COVERAGE% is below minimum threshold of 39%"
                exit 1
              else
                echo "✅ Coverage check passed: $COVERAGE% (threshold: 39%)"
              fi
            else
              echo "⚠️ Could not parse coverage — skipping check"
            fi
          else
            echo "⚠️ Coverage report not generated — skipping check"
          fi

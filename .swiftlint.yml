disabled_rules:
  - trailing_whitespace

opt_in_rules:
  # Code Quality
  - force_unwrapping
  - implicitly_unwrapped_optional
  - weak_delegate
  - fatal_error_message
  - empty_count
  - array_init
  - contains_over_first_not_nil
  - empty_string
  - first_where
  - last_where
  - reduce_into
  - sorted_first_last
  - unused_optional_binding
  - yoda_condition

  # Naming
  - identifier_name

  # Organization
  - explicit_top_level_acl
  - explicit_type_interface
  - explicit_init
  - file_header
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

  # Performance
  - empty_collection_literal
  - reduce_boolean

  # Safety
  - unavailable_function
  - unneeded_break_in_switch

# Error severity
force_unwrapping: error
implicitly_unwrapped_optional: error
fatal_error_message: error

# Line length
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

# Type body length
type_body_length:
  warning: 400
  error: 500

# File length
file_length:
  warning: 600
  error: 800
  ignore_comment_only_lines: true

# Function length
function_body_length:
  warning: 60
  error: 100

# Function parameter count
function_parameter_count:
  warning: 6
  error: 8

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 15
  error: 25

# Nesting
nesting:
  type_level: 2
  function_level: 5

# Identifier naming
identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - id
    - x
    - y

# Type name
type_name:
  min_length: 3
  max_length: 50

excluded:
  - Pods
  - build
  - DerivedData
  - .build
  - .swiftpm
reporter: "xcode"
